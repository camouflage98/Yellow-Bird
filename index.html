<!DOCTYPE html>
<html>
<head>
    <title>3D Maid Shooter - Environment Update</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        .ui-text { margin-bottom: 10px; }
        
        #gameOver {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid red;
        }
        #gameOver h1 { margin: 0 0 20px 0; color: #ff4444; font-size: 48px;}
        #gameOver button {
            font-size: 24px;
            padding: 10px 30px;
            background: #44aa44;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #gameOver button:hover { background: #55cc55; }
        
        #damageFlash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-text">Score: <span id="scoreText">0</span></div>
        <div class="ui-text">Lives: <span id="livesText" style="color: #ffaaaa;">5</span></div>
    </div>
    
    <div id="damageFlash"></div>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <div class="ui-text">Final Score: <span id="finalScore">0</span></div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        // --- AUDIO SYNTHESIZER ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playShootSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playHitSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // 1. SETTING UP THE WORLD
        const scene = new THREE.Scene();
        // Add a gentle fog to hide obstacles popping into existence
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50); 
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        // 2. CREATING THE PLAYER (MAID MODEL)
        const bird = new THREE.Group();
        scene.add(bird);

        const reticleGeom = new THREE.RingGeometry(0.5, 0.6, 16);
        const reticleMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
        const reticle = new THREE.Mesh(reticleGeom, reticleMat);
        reticle.position.z = -20; 
        bird.add(reticle);

        const loader = new THREE.GLTFLoader();
        loader.load(
            'maid.glb', 
            function (gltf) {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5); 
                model.rotation.y = Math.PI; 
                model.position.y = -1;
                bird.add(model);
            },
            undefined, 
            function (error) { console.error("Could not load model", error); }
        );

        // 3. GAME VARIABLES
        const feathers = [];
        const enemies = [];
        const obstacles = []; // NEW: Array for our environment hazards
        
        let score = 0;
        let lives = 5;
        let isGameOver = false;
        
        const scoreText = document.getElementById('scoreText');
        const livesText = document.getElementById('livesText');
        
        let lastShotTime = 0;
        const shootCooldown = 200;

        const raycaster = new THREE.Raycaster();
        const forwardDirection = new THREE.Vector3(0, 0, -1);

        function shootFeather() {
            const featherGeom = new THREE.BoxGeometry(0.3, 0.1, 0.8); 
            const featherMat = new THREE.MeshLambertMaterial({ color: 0xffff00 }); 
            const feather = new THREE.Mesh(featherGeom, featherMat);
            feather.position.set(bird.position.x, bird.position.y, bird.position.z - 1);
            scene.add(feather);
            feathers.push(feather);
            playShootSound();
        }

        // 4. BUILDING ENEMIES & OBSTACLES
        function createEnemyBird(type) {
            const enemyGroup = new THREE.Group();
            let bColor, wColor, beakColor, scale;

            if (type === 1) { 
                bColor = 0xff4444; wColor = 0xcc0000; beakColor = 0xffcc00; scale = 0.8;
                enemyGroup.enemyType = 1;
            } else { 
                bColor = 0x8800ff; wColor = 0x5500aa; beakColor = 0xff8800; scale = 1.2;
                enemyGroup.enemyType = 2;
            }

            const eBodyMat = new THREE.MeshLambertMaterial({ color: bColor });
            const eBody = new THREE.Mesh(new THREE.SphereGeometry(0.6 * scale, 16, 16), eBodyMat);
            eBody.originalColor = bColor; 
            enemyGroup.add(eBody);

            const eBeakMat = new THREE.MeshLambertMaterial({ color: beakColor });
            const eBeak = new THREE.Mesh(new THREE.ConeGeometry(0.2 * scale, 0.6 * scale, 8), eBeakMat);
            eBeak.rotation.x = Math.PI / 2; 
            eBeak.position.z = 0.7 * scale;
            eBeak.originalColor = beakColor;
            enemyGroup.add(eBeak);

            const eWingMat = new THREE.MeshLambertMaterial({ color: wColor });
            const eLeftWing = new THREE.Mesh(new THREE.BoxGeometry(1.2 * scale, 0.1 * scale, 0.5 * scale), eWingMat);
            eLeftWing.position.set(-0.8 * scale, 0, 0);
            eLeftWing.originalColor = wColor;
            enemyGroup.add(eLeftWing);

            const eRightWing = new THREE.Mesh(new THREE.BoxGeometry(1.2 * scale, 0.1 * scale, 0.5 * scale), eWingMat);
            eRightWing.position.set(0.8 * scale, 0, 0);
            eRightWing.originalColor = wColor;
            enemyGroup.add(eRightWing);

            enemyGroup.leftWing = eLeftWing;
            enemyGroup.rightWing = eRightWing;

            return enemyGroup;
        }

        function spawnEnemy() {
            if (isGameOver) return;
            const type = Math.random() > 0.5 ? 1 : 2; 
            const enemy = createEnemyBird(type);
            const randomX = (Math.random() - 0.5) * 20; 
            const randomY = (Math.random() - 0.5) * 12;
            enemy.position.set(randomX, randomY, -40); 
            scene.add(enemy);
            enemies.push(enemy);
        }

        // --- NEW: OBSTACLE BUILDERS ---
        function createTree() {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3), new THREE.MeshLambertMaterial({ color: 0x8B4513 }));
            trunk.position.y = -1.5;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshLambertMaterial({ color: 0x228B22 }));
            leaves.position.y = 1;
            group.add(trunk);
            group.add(leaves);
            return group;
        }

        function createHouse() {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 4), new THREE.MeshLambertMaterial({ color: 0xffffff }));
            base.position.y = -1.5;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(3.5, 2, 4), new THREE.MeshLambertMaterial({ color: 0xaa0000 }));
            roof.position.y = 1;
            roof.rotation.y = Math.PI / 4; 
            group.add(base);
            group.add(roof);
            return group;
        }

        function createPowerLine() {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const pole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 10), poleMat);
            pole1.position.set(-5, 0, 0);
            const pole2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 10), poleMat);
            pole2.position.set(5, 0, 0);
            const line = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 10), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            line.rotation.z = Math.PI / 2;
            line.position.y = 3; 
            group.add(pole1);
            group.add(pole2);
            group.add(line);
            return group;
        }

        function spawnObstacle() {
            if (isGameOver) return;
            const rand = Math.random();
            let obs;
            
            // Pick a random obstacle
            if (rand < 0.33) obs = createTree();
            else if (rand < 0.66) obs = createHouse();
            else obs = createPowerLine();

            // Spawn them low (on the "ground") and out of the fog
            const randomX = (Math.random() - 0.5) * 16; 
            obs.position.set(randomX, -4, -50); 
            
            scene.add(obs);
            obstacles.push(obs);
        }

        setInterval(spawnEnemy, 1500);
        setInterval(spawnObstacle, 2500); // Spawn an obstacle every 2.5 seconds

        // 5. CONTROLS
        let isFiring = false;
        let targetX = 0; 
        let targetY = 0;

        function updatePointer(clientX, clientY) {
            const normalizedX = (clientX / window.innerWidth) * 2 - 1;
            const normalizedY = -(clientY / window.innerHeight) * 2 + 1;
            targetX = normalizedX * 8; 
            targetY = normalizedY * 5;
        }

        window.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
        window.addEventListener('mousedown', () => isFiring = true);
        window.addEventListener('mouseup', () => isFiring = false);
        window.addEventListener('touchmove', (e) => { e.preventDefault(); updatePointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchstart', (e) => { e.preventDefault(); isFiring = true; updatePointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        window.addEventListener('touchend', () => isFiring = false);

        function takeDamage() {
            lives -= 1;
            livesText.innerText = lives;
            bird.position.z += 1.5; 
            playHitSound(); 
            
            const flash = document.getElementById('damageFlash');
            flash.style.opacity = 0.5;
            setTimeout(() => flash.style.opacity = 0, 150);

            if (lives <= 0) {
                isGameOver = true;
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').innerText = score;
            }
        }

        // 6. THE GAME LOOP
        function animate() {
            if (isGameOver) return; 
            requestAnimationFrame(animate);
            const time = Date.now() * 0.01;

            // Move Player
            bird.position.x += (targetX - bird.position.x) * 0.1;
            bird.position.y += (targetY - bird.position.y) * 0.1;
            bird.position.z += (0 - bird.position.z) * 0.1; 

            // Create a Bounding Box around the player for precise collision
            const playerBox = new THREE.Box3().setFromObject(bird);

            // Raycasting / Aim Detection (Only targets enemies!)
            enemies.forEach(enemyBird => {
                enemyBird.children.forEach(part => {
                    part.material.color.setHex(part.originalColor);
                });
            });
            reticle.material.color.setHex(0x00ff00); 
            
            raycaster.set(bird.position, forwardDirection);
            const intersects = raycaster.intersectObjects(enemies, true);
            
            if (intersects.length > 0) {
                reticle.material.color.setHex(0xff0000); 
                const hitParent = intersects[0].object.parent; 
                hitParent.children.forEach(part => {
                    part.material.color.setHex(0xffffff);
                });
            }

            // Shoot Feathers
            if (isFiring && (Date.now() - lastShotTime > shootCooldown)) {
                shootFeather();
                lastShotTime = Date.now();
            }

            // Move Feathers
            for (let i = feathers.length - 1; i >= 0; i--) {
                let f = feathers[i];
                f.position.z -= 0.6; 
                f.rotation.z += 0.1; 
                if (f.position.z < -50) { scene.remove(f); feathers.splice(i, 1); }
            }

            // Move OBSTACLES & Check Collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += 0.15; // Move at a steady ground speed

                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue; 
                }

                // Check Box Collision with Player
                const obsBox = new THREE.Box3().setFromObject(obs);
                obsBox.expandByScalar(-0.4); // Make the hitbox slightly forgiving

                if (playerBox.intersectsBox(obsBox)) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    takeDamage();
                }
            }

            // Move Enemies & Check Collision
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                
                let flapSpeed = e.enemyType === 1 ? time * 1.5 : time * 0.8;
                e.leftWing.rotation.z = Math.sin(flapSpeed) * 0.4;
                e.rightWing.rotation.z = -Math.sin(flapSpeed) * 0.4;

                if (e.enemyType === 1) {
                    e.position.z += 0.25; 
                } else {
                    e.position.z += 0.12; 
                    if (e.position.x < bird.position.x) e.position.x += 0.03;
                    if (e.position.x > bird.position.x) e.position.x -= 0.03;
                    if (e.position.y < bird.position.y) e.position.y += 0.03;
                    if (e.position.y > bird.position.y) e.position.y -= 0.03;
                }

                if (e.position.z > 8) {
                    scene.remove(e);
                    enemies.splice(i, 1);
                    continue; 
                }

                let enemyDestroyed = false;
                for (let j = feathers.length - 1; j >= 0; j--) {
                    let f = feathers[j];
                    if (e.position.distanceTo(f.position) < 1.2) {
                        scene.remove(e); scene.remove(f);
                        enemies.splice(i, 1); feathers.splice(j, 1);
                        
                        score += (e.enemyType === 1) ? 10 : 20; 
                        scoreText.innerText = score;
                        enemyDestroyed = true;
                        
                        playHitSound(); 
                        break; 
                    }
                }
                
                if (!enemyDestroyed) {
                    // We can use distance or Box3 here too. Distance is fine for the birds.
                    if (e.position.distanceTo(bird.position) < 1.5) {
                        scene.remove(e);
                        enemies.splice(i, 1);
                        takeDamage();
                    }
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
